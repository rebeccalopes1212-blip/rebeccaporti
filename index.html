/* ============================================================
   REVEAL WRAPPER
   ============================================================ */

function Reveal({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            setVisible(true);
            obs.unobserve(el);
          }
        });
      },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <div
      ref={ref}
      className={`reveal ${visible ? "is-visible" : ""} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
}

/* ============================================================
   ANIMATED STAT — numbers count up into view for more impact
   ============================================================ */

function AnimatedStat({ value, style, className }) {
  const match = /^(\D*)(\d+(?:[.,]\d+)?)(\D*)$/.exec(value);
  const ref = useRef(null);
  const startedRef = useRef(false);
  const [display, setDisplay] = useState(match ? `${match[1]}0${match[3]}` : value);

  useEffect(() => {
    if (!match) return;
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting && !startedRef.current) {
            startedRef.current = true;
            runAnimation();
            obs.unobserve(el);
          }
        });
      },
      { threshold: 0.4 }
    );
    obs.observe(el);
    return () => obs.disconnect();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value]);

  function runAnimation() {
    const [, prefix, numStr, suffix] = match;
    const target = parseFloat(numStr.replace(",", "."));
    const decimalPart = numStr.split(/[.,]/)[1];
    const decimals = decimalPart ? decimalPart.length : 0;

    const reduced =
      typeof window !== "undefined" &&
      window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (reduced) {
      setDisplay(`${prefix}${numStr}${suffix}`);
      return;
    }

    const duration = 1300;
    const startTime = performance.now();

    function tick(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = target * eased;
      const formatted = decimals ? current.toFixed(decimals) : Math.round(current).toString();
      setDisplay(`${prefix}${formatted}${suffix}`);
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  return (
    <span ref={ref} className={className} style={style}>
      {match ? display : value}
    </span>
  );
}

function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(
    /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([\w-]{11})/
  );
  return m ? m[1] : null;
}

function TikTokMark({ size = 34 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M16.5 3c.28 2.02 1.42 3.62 3.5 4v2.35c-1.28.04-2.5-.33-3.6-1v6.09c0 3.06-2.32 5.56-5.38 5.56A5.4 5.4 0 0 1 5.6 14.6a5.36 5.36 0 0 1 6.02-5.33v2.5a2.9 2.9 0 0 0-3.5 2.83 2.86 2.86 0 0 0 2.9 2.86c1.62 0 2.88-1.29 2.88-2.9V3h2.6z"
        fill="currentColor"
      />
    </svg>
  );
}

/* ============================================================
   APP — theme state, language state, client-side view routing
   ============================================================ */

const SECTION_IDS = ["about", "work", "philosophy", "how-i-think", "contact"];

function App() {
  const [theme, setTheme] = useState("dark");
  const [lang, setLang] = useState("en");
  const [view, setView] = useState("home"); // 'home' | case slug
  const [activeSection, setActiveSection] = useState("about");

  const t = CONTENT[lang];
  const cases = CASES[lang];

  const toggleTheme = useCallback(() => {
    setTheme((cur) => (cur === "dark" ? "light" : "dark"));
  }, []);

  const toggleLang = useCallback(() => {
    setLang((cur) => (cur === "en" ? "pt" : "en"));
  }, []);

  const scrollToId = useCallback((id) => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 76;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  }, []);

  const goHome = useCallback(() => {
    setView("home");
    window.scrollTo(0, 0);
  }, []);

  const openCase = useCallback((slug) => {
    setView(slug);
  }, []);

  useEffect(() => {
    if (view !== "home") return;
    const els = SECTION_IDS.map((id) => document.getElementById(id)).filter(Boolean);
    if (els.length === 0) return;

    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) setActiveSection(entry.target.id);
        });
      },
      { rootMargin: "-40% 0px -50% 0px", threshold: 0 }
    );
    els.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  }, [view, lang]);

  const activeCase = view !== "home" ? cases.find((c) => c.slug === view) : null;

  return (
    <div className="rlp-root" data-theme={theme}>
      <GlobalStyles />
      <Nav
        theme={theme}
        toggleTheme={toggleTheme}
        lang={lang}
        toggleLang={toggleLang}
        view={view}
        goHome={goHome}
        activeSection={activeSection}
        scrollToId={scrollToId}
        t={t}
      />

      {view === "home" ? (
        <main>
          <Hero t={t} scrollToId={scrollToId} />
          <About t={t} />
          <WorkGrid t={t} cases={cases} openCase={openCase} />
          <Philosophy t={t} />
          <HowIThink t={t} />
          <AIInfra t={t} />
          <Contact t={t} />
        </main>
      ) : (
        <main>
          {activeCase ? <CaseDetail caseData={activeCase} t={t} goHome={goHome} /> : null}
        </main>
      )}

      <Footer t={t} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
